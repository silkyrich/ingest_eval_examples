# Sourcetype for the conflicting-timestamps use case. The transform tries
# several date/time formats via INGEST_EVAL and strptime, picking the first
# one that parses.
[conflicting_datetime_formats]
DATETIME_CONFIG = CURRENT
TRANSFORMS-extract_date = conflicting_datetime_formats-test_try_formats

# Sourcetype for the compound-datetimes example: the date comes from the
# filename, the time-of-day is on each log line, and we stitch them together.
[compound_datetimes]
DATETIME_CONFIG = CURRENT
TRANSFORMS-get-date = compound_datetimes-join_and_parse
SHOULD_LINEMERGE=false
LINE_BREAKER=([\n\r]+)

# Applied to every sourcetype.
[default]
# Adds an indexed field with the length of _raw. Lets tstats sum ingested
# byte volume across any source very quickly.
TRANSFORMS-all-data = add_event_length-get_raw_length
# Disable the noisy date_* indexed fields across the entire ingestion pipeline.
ADD_EXTRA_TIME_FIELDS = subseconds

# Example: stripping unwanted indexed fields out of a CSV-parsed source.
[drop_indexed_fields]
# Timestamp comes from the `time` column; we drop that column below.
TIMESTAMP_FIELDS=time
INDEXED_EXTRACTIONS = CSV
# Drop the unwanted columns and the noisy date_* fields.
TRANSFORMS-drop_fields = drop_indexed_fields-drop_useless_columns, shared-drop_useless_time_fields
# Re-surface the dropped columns at search time (only works in this app).
EXTRACT-removed-columns= [^,]+,[^,]+,[^,]+,(?<random_nonsense>[^,]+),(?<long_payload>[^,]+)

# Example: importing data exported from another Splunk instance.
[load_into_indexes]
# Epoch timestamp sits at the start of each line.
TIME_FORMAT = %s.%3Q
TIME_PREFIX = ^
# Pipeline of transforms: drop the CSV header row, lift the metadata fields,
# move them into the real metadata slots, and strip them from _raw.
TRANSFORMS-extract-metadata = load_into_indexes-drop_header, load_into_indexes-extract_metadata_copy_to_meta, load_into_indexes-reassign_meta_to_metadata, load_into_indexes-remove_metadata_from_raw
# CSV escapes double quotes by doubling them; collapse "" back to ".
SEDCMD-strip_double_quotes= s/""/"/g
# This export format supports multi-line events, terminated by ^^^END^^^.
LINE_BREAKER=(\^\^\^END\^\^\^"\n)
SHOULD_LINEMERGE=false

# Example: REPEAT_MATCH + regex to auto-extract key=value pairs into indexed
# fields from any log line.
[auto_extract_indexed_fields]
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d %H:%M:%S
SHOULD_LINEMERGE=false
LINE_BREAKER=([\n\r]+)
# We have indexed fields covering everything we care about, so the major
# segmenters add no value and just bloat the tsidx.
SEGMENTATION = search
TRANSFORMS-extract_indexed_fields=auto_extract_indexed_fields-univeral

# Lifts log_level, component, thread_id and thread_name out of splunkd.log
# into indexed fields. thread_id and thread_name are optional in the regex.
[enrich_splunkd_component_level_thread]
TIME_PREFIX = ^
TIME_FORMAT = %m-%d-%Y %H:%M:%S.%l %z
SHOULD_LINEMERGE=false
LINE_BREAKER=([\n\r]+)
SEGMENTATION = enrich_splunkd_component_level_thread
TRANSFORMS-enrich-splunkd-log_level = enrich_splunkd_component_level_thread-extract_log_level_etc, enrich_splunkd_component_level_thread-drop_null_thread_info

# This sourcetype is forwarded out over tcpout. The transform sets
# _TCP_ROUTING per event to randomise which group each event goes to.
[split_forwarding]
TIME_PREFIX = ^
TIME_FORMAT = %Y-%m-%d %H:%M:%S
SHOULD_LINEMERGE=false
LINE_BREAKER=([\n\r]+)
rename = split_forwarding_sendout
TRANSFORMS-split_forwarding=split_forwarding-randomize_output

# license_usage.log is parsed under the `splunkd` sourcetype, so we match on
# the source path instead and CLONE_SOURCETYPE the event for further processing.
[source::.../var/log/splunk/license_usage.log(.\d+)?]
TRANSFORMS-clone_license = metricify_license-clone

# Convert the cloned license_usage event into a metrics-compliant event and
# route it into the _metrics index.
[metricify_license]
TRANSFORMS-clone_and_convert = metricify_license-extract_fields, shared-drop_useless_time_fields, metricify_license-reassign_meta_fields_and_route_to_index

# Use REGEX transforms to fully decompose the splunkd_access.log URL into
# indexed fields at ingest time.
[enrich_splunkd_access_log]
TIME_PREFIX = \[
TIME_FORMAT = %d/%b/%Y:%H:%M:%S.%f %z
SHOULD_LINEMERGE=false
LINE_BREAKER=([\n\r]+)
TRANSFORMS-enrich_splunkd_access_log = enrich_splunkd_access_log-decompose_url, enrich_splunkd_access_log-move_url_to_host, enrich_splunkd_access_log-extract_url_parameters_from_host_to_meta, enrich_splunkd_access_log-meta_copy_back, shared-drop_useless_time_fields
# The URL is fully decomposed into indexed fields, so the major segmenters
# add nothing and just bloat the tsidx.
SEGMENTATION=search

# Bootstrap stanza for the shard-by-indexkeys example: reads the CSV export,
# extracts the original metadata, clones the event onto the real sourcetype,
# then drops the importer event so only the clone reaches the index.
[shard_data_with_splitbyindexkeys_import]
TIME_FORMAT = %s.%3Q
TIME_PREFIX = ^
# Same header/metadata pipeline as load_into_indexes, plus the clone +
# drop steps to retarget the event onto shard_data_with_splitbyindexkeys.
TRANSFORMS-shard_data_with_splitbyindexkeys_import = load_into_indexes-drop_header, load_into_indexes-extract_metadata_copy_to_meta, load_into_indexes-reassign_meta_to_metadata, load_into_indexes-remove_metadata_from_raw, shard_data_with_splitbyindexkeys-clone, shared_drop_event
# CSV escapes double quotes by doubling them; collapse "" back to ".
SEDCMD-strip_double_quotes= s/""/"/g
# Multi-line events terminated by ^^^END^^^.
LINE_BREAKER=(\^\^\^END\^\^\^"\n)
SHOULD_LINEMERGE=false

# Parses the cloned splunkd events and writes them into the sharded index.
[shard_data_with_splitbyindexkeys]
TRANSFORMS-shard_data_with_splitbyindexkeys = enrich_splunkd_component_level_thread-extract_log_level_etc, enrich_splunkd_component_level_thread-drop_null_thread_info, shard_data_with_splitbyindexkeys-extract_metadata_from_host, shard_data_with_splitbyindexkeys-move_meta_data
# Everything we care about is now in indexed fields, so major segmenters
# just bloat the tsidx.
SEGMENTATION=search

# Optional: apply both enrichers to every splunkd event (left commented).
#[splunkd]
#TRANSFORMS-enrich-splunkd-log_level = auto_extract_indexed_fields-univeral, enrich_splunkd_component_level_thread-extract_log_level_etc, enrich_splunkd_component_level_thread-drop_null_thread_info

# Original event is left untouched and routed to the 'secure' index. The
# clone (below) gets masking applied and lands in the 'insecure' index.
[mask_and_clone]
TIME_PREFIX = ^
TIME_FORMAT = %H:%M:%S %y-%m-%d
SHOULD_LINEMERGE=false
LINE_BREAKER=([\n\r]+)
# Clone the event onto a temporary sourcetype so the masking pipeline runs
# only on the copy.
TRANSFORMS-apply-masking=mask_and_clone-clone

# The cloned event: mask sensitive fields with SED, route to the 'insecure'
# index, and rename back to the original sourcetype.
[mask_and_clone-clone]
# SED is preferred over INGEST_EVAL replace() — compiled regex engine, and
# you can chain commands with whitespace as the separator.
SEDCMD-mask = s/email_address=(\S\S)\S*(.)@(.)\S*(\S\S\S)\s/email_address=\1..\2@\3..\4 /g s/password=\S+/password=#######/g
# Route the masked clone into a different index to prove the split.
TRANSFORMS-route-to-index = shared-drop_useless_time_fields, shared-route_to_ingest_eval_examples_2
# Reset the sourcetype back to the original so search-time consumers don't
# have to know about the intermediate one.
rename = mask_and_clone

# More elaborate masking: clones the event into a separate "map" event that
# stores the encoded/decoded pairs, so a privileged user can reverse the mask.
[mask_data_and_map]
TIME_PREFIX = ^
TIME_FORMAT = %H:%M:%S %y-%m-%d
SHOULD_LINEMERGE=false
LINE_BREAKER=([\n\r]+)
TRANSFORMS-apply-masking=mask_data_and_map-extract_email, mask_data_and_map-extract_password, mask_data_and_map-encode_email_and_password, mask_data_and_map-clone, mask_data_and_map-apply_hashes

# The cloned event is converted into the reverse-mapping record and sent
# to the secondary index.
[mask_data_and_map-clone]
TRANSFORMS-create_map = shared-route_to_ingest_eval_examples_2, mask_data_and_map-create_map
rename=mask_data_and_map-map

# Demonstrates how to resolve field-name clashes when using INDEXED_EXTRACTIONS
# (a JSON `host` field colliding with the Splunk metadata `host`).
[name_clash]
INDEXED_EXTRACTIONS = JSON
TIMESTAMP_FIELDS = start_time
TIME_FORMAT = %Y-%m-%dT%T
TRANSFORMS-rename_host = name_clash_rename_host

# Docker JSON log driver embeds the original log line inside a "log" field.
[json_docker]
# Use the JSON parser to lift every JSON key into an indexed field.
INDEXED_EXTRACTIONS = JSON
# Timestamp is the JSON `time` field.
TIMESTAMP_FIELDS = time
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%QZ
# INGEST_EVAL moves the embedded log content back into _raw and drops the
# JSON wrapper fields.
TRANSFORMS-json_docker = json_docker_reassign_raw_drop_time
SHOULD_LINEMERGE=false
LINE_BREAKER=([\n\r]+)

# Scan _raw for anything that looks like an IP address and write each match
# out as an indexed `ip` field.
[find_ip_addresses]
TIME_FORMAT = %d-%m-%Y %H:%M:%S
SHOULD_LINEMERGE=false
LINE_BREAKER=([\n\r]+)
TRANSFORMS-find-find_ip_addresses=find_ip_addresses